interface:
  display_name: "Deep Research"
  short_description: "Multimodal research reports with PDF evidence and citations"
  default_prompt: "Use $deepresearch-skill to turn this question and its sources into an evidence-backed research report with a complete LaTeX file and a rendered PDF. Start from the bundled report template, choose a theme that fits the topic and audience, and keep the report grounded in a credible source ledger and explicit claim support. Use extra packaging, specialized table helpers, and additional visual polish only when they materially improve the deliverable. Unless the user asks otherwise, write the full artifact bundle under the user's preferred deepresearch output root using YYYY/MM/DD/<topic-slug>-YYYY-MM-DD/ and keep the report directory basename in <topic-slug>-YYYY-MM-DD form."
