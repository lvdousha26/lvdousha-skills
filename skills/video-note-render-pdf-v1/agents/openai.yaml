interface:
  display_name: "Video Note Render PDF v1"
  short_description: "Turn a YouTube or Bilibili lecture into a structured LaTeX/PDF note."
  default_prompt: "Use this skill to turn a YouTube or Bilibili video into a high-quality Chinese LaTeX/PDF course note through the unified video-note pipeline. Resolve the external runtime repo and case workspace first, prefer official subtitles over cookies-based subtitles over ASR fallback, treat ASR as fallback rather than the default path, keep the official cover image on the front page, filter greetings, sponsorship, channel logistics, and 弹幕-like noise, make the main body scale roughly with subtitle and time emphasis instead of defaulting to a fixed-thickness summary, build a lightweight content map before drafting, use exhaustive frame recall before down-selection when the writing needs evidence or explanation support, reject sloppy crops or blurry enlargements, keep valuable closing discussion for a final synthesis chapter, and after compiling re-read the key transcript segments plus final figures for a coverage, figure, and page revision pass."
